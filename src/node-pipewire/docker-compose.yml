services:
  pipewire:
    extra_hosts:
      - pipewire:127.0.0.1
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - TZ=Europe/London
      - MEMCACHE=true
    container_name: pipewire
    hostname: pipewire
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd:rw
    privileged: true

